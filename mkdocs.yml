site_name: RulEuler 规则引擎
site_description: 基于 Rete 算法的开源规则引擎
site_url: https://sibosend.github.io/ruleuler
repo_url: https://github.com/sibosend/ruleuler
repo_name: sibosend/ruleuler

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
  features:
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - 首页: index.md
  - 快速开始:
    - Docker 启动: getting-started/quickstart.md
    - 本地开发: getting-started/local-dev.md
    - 配置说明: getting-started/configuration.md
  - 使用指南:
    - 核心概念: guide/concepts.md
    - 变量定义: guide/general-entity.md
    - 规则类型: guide/rule-types.md
    - REA 表达式: guide/rea-expression.md
    - 自动测试: guide/autotest.md
    - 存储模式: guide/storage.md
    - 变量监控: guide/monitoring.md
    - 上线管理: guide/release-management.md
    - 依赖分析: guide/dependency-analysis.md
    - 权限管理: guide/rbac.md
    - 审计日志: guide/audit-log.md
  - API 参考:
    - 客户端 API: api/client-api.md
    - 管理端 API: api/server-api.md
  - 架构设计:
    - 系统概览: architecture/overview.md
  - 部署:
    - Docker 部署: deployment/docker.md
    - 独立部署: deployment/standalone.md
  - 贡献指南: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - tables
  - attr_list

extra_css:
  - stylesheets/extra.css

extra:
  alternate:
    - name: 中文
      link: /ruleuler/
      lang: zh
    - name: English
      link: /ruleuler/en/
      lang: en

plugins:
  - search
